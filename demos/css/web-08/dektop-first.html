<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Queries</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      header {
        text-align: center;
        color: black;
        min-height: 100px;

        h1 {
          margin: 0;
          padding: 0;
          font-size: 2rem;
        }
      }

      div.container {
        min-height: 100vh;
        background-color: cadetblue;
      }

      .mobile-only {
        display: none;
      }

      @media (width < 600px) {
        div.container {
          background-color: brown;
        }

        header {
          color: white;
        }
      }

      @media (width < 400px) {
        .mobile-only {
          display: block;
        }
        .no-mobile {
          display: none;
        }

        div.container {
          background-color: blueviolet;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <header>
        <h1>RWD</h1>
        <p class="mobile-only">Esto se ve en el mobile</p>
        <p class="no-mobile">Esto se ve fuera del mobile</p>
      </header>
    </div>
  </body>
</html>
