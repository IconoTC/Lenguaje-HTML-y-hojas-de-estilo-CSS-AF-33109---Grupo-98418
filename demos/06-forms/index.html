<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formularios | Curso de HTML</title>
    <link rel="icon" href="logo.svg" type="image/svg+xml" />
    <style>
      .form-control {
        display: block;
        margin-bottom: 10px;
      }
      .required {
        color: red;
        font-size: 1.4rem;
      }
    </style>

  </head>

  <body>
    <h1>Demo de HTML: Formularios</h1>
    <section id="contact" aria-label="Contacto">
      <h2>Contacto</h2>
      <p>¿Quieres contactar conmigo?</p>
      <form method="get" aria-label="Formulario de contacto">
        <label class="form-control">
          <span>Nombre:</span>
          <input
            type="text"
            name="user-name"
            placeholder="Dime tu nombre"
            required
          />
          <span class="required" aria-label="Campo obligatorio">*</span>
        </label>

        <!-- 
        Forma alternativa de vincular la label
        <div class="form-control">
          <label for="user-name">Nombre:</label>
          <input
            type="text"
            name="user-name"
            id="user-name"
            placeholder="Dime tu nombre"
            required
          />
        </div> -->

        <label class="form-control">
            Teléfono:
            <input type="tel" name="phone" pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}" placeholder="123-456-7890">
        </label>
        <label class="form-control">
            Edad:
            <input type="number" name="age" min="0" max="120">
        </label>
        <label class="form-control">
            Contraseña:
            <input type="password" id="password" name="password" required>
        </label>
        <label class="form-control">
            Fecha de nacimiento:
            <input type="date" id="dob" name="dob" required>
        </label>
        <label class="form-control">
            Hora de contacto:
            <input type="time" id="contact-time" name="contact-time">
        </label>
        <label class="form-control">
            Avatar
            <input type="file" name="file" id="file" accept=".pdf,.doc,.docx,image/*">
        </label>
        <div class="form-control">
            <label for="email">Correo electrónico:</label>
            <input type="email" id="email" name="email">
        </div>
        <label class="form-control">
            <span>Mensaje:</span>
            <textarea id="message" name="message"></textarea>
        </label>
        <!-- // Radio buttons: -->
        <fieldset class="form-control">
            <legend>¿Cómo prefieres que te contacte?</legend>
            <label>
                <input type="radio" name="contact-method" value="email" required>
                Correo electrónico
            </label>
            <label>
                <input type="radio" name="contact-method" value="phone">
                Teléfono
            </label>
        </fieldset>
        <!-- // Checkbox: -->
        <fieldset class="form-control">
            <legend>Suscribirse a:</legend>
            <label>
                <input type="checkbox" name="subscribe-newsletter">
                Newsletter
            </label>
            <label>
                <input type="checkbox" name="subscribe-updates">
                Actualizaciones de productos
            </label>
        </fieldset>
        <!--  Select-->
        </div> 
            <label class="form-control">País:
                <select name="country" required>
                    <option value="">Selecciona un país</option>
                    <option value="es">España</option>
                    <option value="fr">Francia</option>
                    <option value="de">Alemania</option>
                    <option value="other">Otros</option>
                </select>
            </label>
        <div class="form-control">
          <button type="submit">Enviar</button>
          <button type="reset">Restablecer</button>
        </div>
      </form>
      <button type="submit">Haz click</button>
      <a href="mailto:example@example.com">Contactar por correo</a>
    </section>

        <script defer>

    document.querySelector("form").addEventListener("submit", handleSubmit);

      function handleSubmit(event) {
        event.preventDefault();
        const formData = new FormData(event.target);
        const data = {};
        formData.forEach((value, key) => {
          data[key] = value;
        });
        console.log("Datos del formulario:", data);
      }
    </script>
  </body>
</html>
