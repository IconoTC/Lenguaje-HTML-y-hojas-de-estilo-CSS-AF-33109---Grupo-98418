<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Document</title>
    <style>
        caption {
            caption-side: top;
            font-weight: bold;
            margin-bottom: 10px;
      
        }
        table {
            border-collapse: collapse;
            width: 100%;
        }
        th, td:not(.empty) {
            border: 1px solid black;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
    <h1>Tabla de datos</h1>

    <table>
        <caption>Tabla de ejemplo</caption>
        <thead>
            <tr>
                <td class="empty"></td>
                <th>Edad</th>
                <th>Ciudad</th>
            </tr>
        </thead>
        <tbody>
            <!-- <tr>
                <td>Nombre</td>
                <td>Edad</td>
                <td>Ciudad</td>
            </tr> -->
            <tr>
                <th>Ana</th>
                <td>28</td>
                <td>Madrid</td>
            </tr>
            <tr>
                <th>Carlos</th>
                <td>35</td>
                <td>Barcelona</td>
            </tr>
            <tr>
                <th>Lucía</th>
                <td>22</td>
                <td>Valencia</td>
            </tr>
        </tbody>
    
</body>
</html>
